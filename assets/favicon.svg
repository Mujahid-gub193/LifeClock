<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Navy background circle -->
  <circle cx="16" cy="16" r="15" fill="#0d1117"/>
  <!-- Teal ring -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#1d9e75" stroke-width="2"/>
  <!-- Clock hour hand -->
  <line x1="16" y1="16" x2="16" y2="8" stroke="#e6edf3" stroke-width="2" stroke-linecap="round"/>
  <!-- Clock minute hand -->
  <line x1="16" y1="16" x2="22" y2="20" stroke="#e6edf3" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Amber center dot -->
  <circle cx="16" cy="16" r="2.5" fill="#f0a500"/>
</svg>
