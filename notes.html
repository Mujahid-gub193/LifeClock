<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes — LifeClock</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <script src="/theme.js"></script><link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .notes-layout { max-width: 960px; margin: 2rem auto; padding: 0 1.5rem 4rem; display: grid; grid-template-columns: 260px 1fr; gap: 1.5rem; }
    .page-header  { display:flex; align-items:center; justify-content:space-between; margin-bottom: 1.25rem; }
    .page-title   { font-size: 1.4rem; font-weight: 800; letter-spacing: -.02em; }

    /* Sidebar */
    .notes-sidebar { display: flex; flex-direction: column; gap: .5rem; }
    .notes-date-input { width: 100%; }
    .note-item {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: .65rem .85rem;
      cursor: pointer; transition: border-color .15s;
    }
    .note-item:hover  { border-color: var(--accent-blue); }
    .note-item.active { border-color: var(--accent-blue); background: rgba(56,139,253,.07); }
    .note-item-date   { font-size: .7rem; font-weight: 700; color: var(--accent-blue); text-transform: uppercase; letter-spacing: .05em; }
    .note-item-preview{ font-size: .8rem; color: var(--text-secondary); margin-top: .15rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Editor */
    .notes-editor { display: flex; flex-direction: column; gap: .75rem; }
    .editor-header { display: flex; align-items: center; gap: .75rem; flex-wrap: wrap; }
    .editor-date-label { font-size: 1rem; font-weight: 700; flex: 1; }

    /* Toolbar */
    .editor-toolbar {
      display: flex; gap: .25rem; flex-wrap: wrap;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: .4rem .5rem; border-bottom: none;
    }
    .tb-btn {
      background: none; border: 1px solid transparent; color: var(--text-secondary);
      border-radius: 4px; padding: .25rem .45rem; font-size: .82rem; font-weight: 700;
      cursor: pointer; transition: all .15s; line-height: 1;
    }
    .tb-btn:hover { background: var(--bg-input); border-color: var(--border); color: var(--text-primary); }
    .tb-sep { width: 1px; background: var(--border); margin: .1rem .15rem; }

    /* Content editable area */
    .note-editor-area {
      min-height: 420px; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 0 0 var(--radius) var(--radius);
      padding: 1rem 1.25rem; outline: none;
      font-size: .92rem; line-height: 1.75; color: var(--text-primary);
      overflow-y: auto;
    }
    .note-editor-area:focus { border-color: var(--accent-blue); }
    .note-editor-area h1 { font-size: 1.4rem; font-weight: 800; margin: .5rem 0; }
    .note-editor-area h2 { font-size: 1.1rem; font-weight: 700; margin: .4rem 0; }
    .note-editor-area ul, .note-editor-area ol { padding-left: 1.5rem; }
    .note-editor-area blockquote { border-left: 3px solid var(--accent-blue); padding-left: .75rem; color: var(--text-secondary); margin: .5rem 0; }
    .note-editor-area a { color: var(--accent-blue); }

    .editor-footer { display: flex; align-items: center; justify-content: space-between; }
    .note-status { font-size: .75rem; color: var(--text-secondary); }

    @media (max-width: 700px) {
      .notes-layout { grid-template-columns: 1fr; }
      .notes-sidebar { display: none; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a href="index.html" class="btn btn-ghost btn-sm">← Back</a>
    <div class="topbar-logo"><img src="/assets/logo.svg" alt="LifeClock" height="32"></div>
    <div></div>
  </header>

  <div style="max-width:960px;margin:2rem auto;padding:0 1.5rem .5rem">
    <div class="page-header">
      <div>
        <div class="page-title">Notes</div>
        <div style="font-size:.82rem;color:var(--text-secondary);margin-top:.15rem">Rich notes linked to dates</div>
      </div>
      <button class="btn btn-primary" id="newNoteBtn">+ New Note</button>
    </div>
  </div>

  <div class="notes-layout">
    <!-- Sidebar: note list -->
    <aside class="notes-sidebar">
      <input type="date" id="filterDate" class="input notes-date-input" placeholder="Filter by date">
      <div id="notesList"><p class="empty-msg">No notes yet</p></div>
    </aside>

    <!-- Editor -->
    <div class="notes-editor" id="editorWrap">
      <div class="editor-header">
        <div class="editor-date-label" id="editorDateLabel">Select or create a note</div>
        <input type="date" id="noteDatePicker" class="input" style="width:160px">
      </div>

      <div class="editor-toolbar">
        <button class="tb-btn" onclick="fmt('bold')"><b>B</b></button>
        <button class="tb-btn" onclick="fmt('italic')"><i>I</i></button>
        <button class="tb-btn" onclick="fmt('underline')"><u>U</u></button>
        <div class="tb-sep"></div>
        <button class="tb-btn" onclick="fmt('formatBlock','h1')">H1</button>
        <button class="tb-btn" onclick="fmt('formatBlock','h2')">H2</button>
        <div class="tb-sep"></div>
        <button class="tb-btn" onclick="fmt('insertUnorderedList')">• List</button>
        <button class="tb-btn" onclick="fmt('insertOrderedList')">1. List</button>
        <button class="tb-btn" onclick="fmt('formatBlock','blockquote')">" Quote</button>
        <div class="tb-sep"></div>
        <button class="tb-btn" onclick="fmt('removeFormat')">Clear</button>
      </div>

      <div class="note-editor-area" id="noteEditor" contenteditable="true" spellcheck="true">
        <p style="color:var(--text-secondary)">Start writing your note here...</p>
      </div>

      <div class="editor-footer">
        <span class="note-status" id="noteStatus"></span>
        <div style="display:flex;gap:.5rem">
          <button class="btn btn-danger btn-sm" id="deleteNoteBtn" style="display:none">Delete</button>
          <button class="btn btn-primary" id="saveNoteBtn">Save Note</button>
        </div>
      </div>
    </div>
  </div>

  <footer class="page-footer">
    <strong>LifeClock</strong> | Structured notes linked to dates and plans.
  </footer>

  <script src="notes.js"></script>
</body>
</html>
