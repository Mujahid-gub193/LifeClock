<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — LifeClock</title>
  <script src="/theme.js"></script><link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <header class="topbar">
    <a href="index.html" class="btn btn-ghost btn-sm">← Back</a>
    <div class="topbar-logo"><img src="/assets/logo.svg" alt="LifeClock" height="32"></div>
    <div></div>
  </header>
  <div style="max-width:400px;margin:4rem auto;padding:0 1rem">
    <div class="card">
      <h2 style="font-size:1.3rem;font-weight:800;margin-bottom:1rem">Set New Password</h2>
      <div style="display:flex;flex-direction:column;gap:.75rem">
        <input type="password" id="newPass" class="input" placeholder="New password (min 6 chars)">
        <input type="password" id="confPass" class="input" placeholder="Confirm new password">
        <button class="btn btn-primary w-full" id="resetBtn">Update Password</button>
        <p id="resetMsg" class="hidden" style="font-size:.82rem;text-align:center"></p>
      </div>
    </div>
  </div>
  <footer class="page-footer">
    <strong>LifeClock</strong> | Secure account recovery and password management.
  </footer>
  <script>
    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) document.getElementById('resetBtn').disabled = true;

    document.getElementById('resetBtn').addEventListener('click', async () => {
      const pass = document.getElementById('newPass').value;
      const conf = document.getElementById('confPass').value;
      const msg  = document.getElementById('resetMsg');
      if (pass.length < 6) { msg.textContent = 'Password must be at least 6 characters'; msg.style.color='var(--accent-red)'; msg.classList.remove('hidden'); return; }
      if (pass !== conf)   { msg.textContent = 'Passwords do not match'; msg.style.color='var(--accent-red)'; msg.classList.remove('hidden'); return; }
      try {
        const res  = await fetch('/api/auth/reset-password', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ token, password: pass }) });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);
        msg.textContent = data.message + ' Redirecting...';
        msg.style.color = 'var(--accent-green)';
        msg.classList.remove('hidden');
        setTimeout(() => window.location.href = '/', 2000);
      } catch (e) { msg.textContent = e.message; msg.style.color='var(--accent-red)'; msg.classList.remove('hidden'); }
    });
  </script>
</body>
</html>
