<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <!-- Clock+Calendar Icon -->
  <circle cx="50" cy="50" r="38" fill="#161b22" stroke="#388bfd" stroke-width="2.5"/>
  <!-- Clock ticks -->
  <line x1="50" y1="16" x2="50" y2="24" stroke="#388bfd" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="76" x2="50" y2="84" stroke="#388bfd" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="50" x2="24" y2="50" stroke="#388bfd" stroke-width="2" stroke-linecap="round"/>
  <line x1="76" y1="50" x2="84" y2="50" stroke="#388bfd" stroke-width="2" stroke-linecap="round"/>
  <!-- Clock hands -->
  <line x1="50" y1="50" x2="50" y2="28" stroke="#e6edf3" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="66" y2="58" stroke="#f0a500" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="50" cy="50" r="3" fill="#388bfd"/>
  <!-- Calendar grid dots (bottom-right of clock face) -->
  <circle cx="58" cy="62" r="2" fill="#3fb950"/>
  <circle cx="65" cy="62" r="2" fill="#3fb950"/>
  <circle cx="58" cy="69" r="2" fill="#3fb950" opacity=".5"/>
  <circle cx="65" cy="69" r="2" fill="#f0a500"/>

  <!-- Wordmark -->
  <text x="100" y="46" font-family="Inter,system-ui,sans-serif" font-size="28" font-weight="800" letter-spacing="-1" fill="#e6edf3">Life<tspan fill="#388bfd">Clock</tspan></text>

  <!-- Tagline -->
  <text x="101" y="66" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="500" letter-spacing="2.5" fill="#8b949e">YOUR LIFE. YOUR TIME.</text>
</svg>
